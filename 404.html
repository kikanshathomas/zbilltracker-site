<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | Zombie Bill Tracker</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0e0e10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e0e10; --line:#2a2a2e; --text:#f0f0f2; --text-dim:#9a9aa0; --text-faint:#7a7a80; --r:4px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg); color:var(--text); font-family:'Outfit',system-ui,-apple-system,'Segoe UI',sans-serif; font-weight:300;
       min-height:100vh; display:grid; place-items:center; text-transform:uppercase; letter-spacing:.02em; text-align:center; padding:24px}
  .eyebrow{font-size:11px; font-weight:600; letter-spacing:.16em; color:var(--text-faint); margin-bottom:18px}
  .n{font-size:clamp(80px,18vw,180px); font-weight:800; letter-spacing:-.04em; line-height:1; color:var(--text)}
  h1{font-size:clamp(18px,3vw,28px); font-weight:600; margin-top:10px; letter-spacing:-.01em}
  p{color:var(--text-dim); font-size:14px; margin-top:14px; letter-spacing:.04em}
  a.btn{display:inline-block; margin-top:30px; background:var(--text); color:var(--bg); text-decoration:none;
        padding:12px 26px; border-radius:var(--r); font-weight:600; font-size:13px; transition:opacity .15s}
  a.btn:hover{opacity:.85}
</style>
</head>
<body>
  <main>
    <div class="eyebrow">Zombie Bill Tracker</div>
    <div class="n">404</div>
    <h1>This page didn't survive.</h1>
    <p>It wandered off, got bit, or never existed. The camp is still standing.</p>
    <a class="btn" href="/">Back to camp</a>
  </main>
  <script data-goatcounter="https://zbilltracker.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
